<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Telegram Radar Ultra</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  /* Dark Theme (Default) */
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --surface3: #30363d;
  --blue: #0ea5e9;
  --blue-dim: #0284c7;
  --blue-glow: rgba(14,165,233,.12);
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-dim: #6e7681;
  --border: rgba(240,246,252,.1);
  --border-soft: rgba(240,246,252,.06);
  --accent: #58a6ff;
  --green: #3fb950;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
}

[data-theme="light"] {
  --bg: #f6f8fa;
  --surface: #ffffff;
  --surface2: #f0f2f5;
  --surface3: #e1e4e8;
  --blue: #0969da;
  --blue-dim: #0550ae;
  --blue-glow: rgba(9,105,218,0.1);
  --text: #1f2328;
  --text-muted: #57606a;
  --text-dim: #6e7781;
  --border: rgba(31,35,40,0.15);
  --border-soft: rgba(31,35,40,0.08);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  font-family:'Inter', sans-serif;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── HEADER ── */
header{
  position:sticky;
  top:0;
  z-index:999;
  background: var(--bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;
}

.header-inner{
  max-width:1600px;
  margin:auto;
  padding:18px 0;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-icon{
  width:40px;
  height:40px;
  border-radius:10px;
  background:linear-gradient(135deg,#0ea5e9,#0284c7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  flex-shrink:0;
}

.logo-text{
  font-size:20px;
  font-weight:700;
  color:var(--text);
  letter-spacing:-.3px;
}

.logo-badge{
  font-size:10px;
  font-weight:600;
  background:var(--blue-glow);
  border:1px solid rgba(14,165,233,.3);
  color:var(--blue);
  padding:2px 8px;
  border-radius:20px;
  letter-spacing:.5px;
}

.header-right{
  display:flex;
  align-items:center;
  gap:12px;
}

.theme-toggle {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.theme-toggle:hover {
  background: var(--surface3);
}

.status-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px rgba(63,185,80,.6);
  animation:pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot{
  0%,100%{opacity:1;}
  50%{opacity:.4;}
}

.status-label{
  font-size:12px;
  color:var(--text-muted);
  font-weight: 600;
}

/* ── SEARCH & SORT ── */
.controls-row {
  display: flex;
  gap: 12px;
  align-items: center;
}

.search-wrapper{
  position:relative;
  flex-grow: 1;
}

.search-icon{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-dim);
  font-size:18px;
  pointer-events:none;
  transition:color .2s;
}

#searchInput{
  width:100%;
  padding:14px 20px 14px 50px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  color:var(--text);
  font-family:inherit;
  font-size:15px;
  outline:none;
  transition:all .25s;
}

#searchInput:focus{
  border-color:rgba(14,165,233,.5);
  background:var(--surface);
  box-shadow:0 0 0 3px var(--blue-glow);
}

.sort-select {
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  outline: none;
}

/* ── CONTROLS BAR ── */
.controls-bar{
  max-width:1600px;
  margin:20px auto;
  padding:0 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
}

.stats-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:100px;
  padding:7px 14px;
  font-size:13px;
  color:var(--text-muted);
}

.stats-pill strong{color:var(--blue);font-weight:600;}

/* ── GRID ── */
.radar-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(400px,1fr));
  gap:16px;
  padding:0 24px 24px;
  max-width:1600px;
  margin:auto;
}

/* ── POST CARD ── */
.post-card{
  background:var(--surface);
  border-radius:var(--radius-lg);
  border:1px solid var(--border);
  overflow:hidden;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  animation:card-in .35s ease both;
}

@keyframes card-in{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}

.post-card:hover{
  transform:translateY(-3px);
  border-color:rgba(14,165,233,.3);
  box-shadow:0 8px 32px rgba(0,0,0,.15);
}

.post-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px;
  background:var(--surface2);
  border-bottom:1px solid var(--border-soft);
}

.header-left{
  display:flex;
  align-items:center;
  gap:8px;
}

.keyword-tag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:var(--blue-glow);
  border:1px solid rgba(14,165,233,.25);
  color:var(--blue);
  font-size:12px;
  font-weight:600;
  padding:4px 10px;
  border-radius:100px;
}

.channel-tag{
  display:inline-flex;
  align-items:center;
  gap:4px;
  background:rgba(139,148,158,.08);
  border:1px solid var(--border);
  color:var(--text-muted);
  font-size:12px;
  padding:4px 10px;
  border-radius:100px;
}

.telegram-widget-container{
  min-height:160px;
  padding:12px;
  background:var(--surface);
}

.widget-skeleton{
  height:140px;
  background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);
  background-size:200% 100%;
  border-radius:var(--radius-md);
  animation:shimmer 1.5s infinite;
}

@keyframes shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

.post-footer{
  padding:12px 16px;
  border-top:1px solid var(--border-soft);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.open-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:var(--blue);
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  padding:7px 14px;
  border-radius:var(--radius-sm);
  background:var(--blue-glow);
  border:1px solid rgba(14,165,233,.25);
  transition:all .2s;
}

.open-btn:hover{
  background:rgba(14,165,233,.2);
  transform:scale(1.03);
}

/* ── PAGINATION ── */
#paginationUI{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  padding:24px;
}

.pg-btn{
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
  padding:10px 20px;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-family:inherit;
  transition:all .2s;
}

.pg-btn:hover:not(:disabled){
  background:var(--surface3);
  color:var(--blue);
}

.pg-btn:disabled{ opacity:.35; cursor:not-allowed; }

/* ── LOADING & EMPTY ── */
#loading{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:80px 20px;
  color:var(--text-muted);
}

.spinner{
  width:40px;height:40px;
  border:2px solid var(--border);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}

.empty-state{ text-align:center; padding:60px 20px; color:var(--text-muted); }

@media(max-width:768px){
  .radar-grid{grid-template-columns:1fr;}
  .controls-row { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📡</div>
        <span class="logo-text">Telegram Radar</span>
        <span class="logo-badge">ULTRA</span>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" title="Toggle Light/Dark Mode">🌓</button>
        <div class="status-dot"></div>
        <span class="status-label">LIVE</span>
      </div>
    </div>

    <div class="controls-row">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search by keyword or channel name..."
          autocomplete="off"
        />
      </div>
      <select id="sortSelect" class="sort-select">
        <option value="random">Shuffle (Random)</option>
        <option value="newest">Newest First</option>
      </select>
    </div>
  </div>
</header>

<div class="controls-bar">
  <div class="stats-pill" id="statsDisplay">
    <span class="dot"></span>
    Initializing...
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <span>Fetching data...</span>
</div>

<div id="radarGrid" class="radar-grid"></div>

<div id="paginationUI"></div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/MoFlow00/Signal-X/main/telegram_data.csv';

let allData = [];
let filteredData = [];
let currentSort = 'random';

const MAX_CHANNELS = 5000;
const POSTS_PER_PAGE = 50;
let currentPage = 1;

// --- Theme Logic ---
const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click', () => {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
});

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);

async function initRadar() {
  try {
    const response = await fetch(CSV_URL);
    const csvText = await response.text();
    Papa.parse(csvText, {
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        allData = results.data.filter(row => 
          row.LatestID && row.LatestID !== "None" && row.Link
        );
        filteredData = [...allData];
        document.getElementById('loading').style.display = 'none';
        renderPosts();
      }
    });
  } catch (err) {
    console.error(err);
    document.getElementById('loading').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3>Data Load Failed</h3>
        <p>Please check your connection and refresh.</p>
      </div>`;
  }
}

function renderPosts() {
  const grid = document.getElementById('radarGrid');
  grid.innerHTML = '';

  let allPosts = [];
  const channels = filteredData.slice(0, MAX_CHANNELS);

  channels.forEach(item => {
    try {
      const username = item.Link.split('t.me/')[1].split('/')[0];
      const latestId = parseInt(item.LatestID);
      // Take last 5 posts from each channel
      for (let i = 0; i < 5; i++) {
        const msgId = latestId - i;
        if (msgId <= 0) break;
        allPosts.push({ 
            username, 
            msgId, 
            keyword: item.Keyword || 'General',
            globalId: msgId // Using msgId as proxy for timestamp
        });
      }
    } catch(e) {}
  });

  // --- Sorting Logic ---
  if (currentSort === 'random') {
    allPosts.sort(() => Math.random() - 0.5);
  } else {
    // Newest First
    allPosts.sort((a, b) => b.msgId - a.msgId);
  }

  const start = (currentPage - 1) * POSTS_PER_PAGE;
  const end = start + POSTS_PER_PAGE;
  const currentPosts = allPosts.slice(start, end);

  if (currentPosts.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>No results found</h3><p>Try a different keyword</p></div>`;
    document.getElementById('statsDisplay').innerHTML = `0 results`;
    document.getElementById('paginationUI').innerHTML = '';
    return;
  }

  currentPosts.forEach((post, idx) => {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.style.animationDelay = (idx * 15) + 'ms';
    card.innerHTML = `
      <div class="post-header">
        <div class="header-left">
          <span class="keyword-tag">#${escHtml(post.keyword)}</span>
        </div>
        <span class="channel-tag">@${escHtml(post.username)}</span>
      </div>
      <div class="telegram-widget-container" data-username="${escHtml(post.username)}" data-msgid="${post.msgId}">
        <div class="widget-skeleton"></div>
      </div>
      <div class="post-footer">
        <a class="open-btn" href="https://t.me/${escHtml(post.username)}/${post.msgId}" target="_blank">
          View Post
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    `;
    grid.appendChild(card);
  });

  const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
  document.getElementById('statsDisplay').innerHTML = `Page <strong>${currentPage}</strong> of <strong>${totalPages}</strong> &nbsp;·&nbsp; Total <strong>${allPosts.length}</strong> posts`;

  renderPagination(allPosts.length);
  lazyLoadWidgets();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function lazyLoadWidgets() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      if (el.dataset.loaded) return;
      el.dataset.loaded = true;
      el.innerHTML = '';
      
      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.setAttribute('data-telegram-post', `${el.dataset.username}/${el.dataset.msgid}`);
      script.setAttribute('data-width', '100%');
      script.setAttribute('data-userpic', 'false');
      // Adjust widget theme based on current site theme
      const currentTheme = document.documentElement.getAttribute('data-theme');
      if(currentTheme === 'dark') script.setAttribute('data-dark', '1');
      
      el.appendChild(script);
      observer.unobserve(el);
    });
  }, { rootMargin: '400px' });

  document.querySelectorAll('.telegram-widget-container').forEach(el => observer.observe(el));
}

function handleSearch() {
  currentPage = 1;
  const term = document.getElementById('searchInput').value.toLowerCase();
  filteredData = allData.filter(item => 
    item.Keyword?.toLowerCase().includes(term) || 
    item.Link?.toLowerCase().includes(term)
  );
  renderPosts();
}

document.getElementById('sortSelect').addEventListener('change', (e) => {
  currentSort = e.target.value;
  currentPage = 1;
  renderPosts();
});

function renderPagination(totalPosts) {
  const totalPages = Math.ceil(totalPosts / POSTS_PER_PAGE);
  const pagination = document.getElementById('paginationUI');
  pagination.innerHTML = `
    <button class="pg-btn" onclick="changePage(-1)" ${currentPage <= 1 ? 'disabled' : ''}>← Previous</button>
    <span style="font-size:14px; color:var(--text-muted)">${currentPage} / ${totalPages}</span>
    <button class="pg-btn" onclick="changePage(1)" ${currentPage >= totalPages ? 'disabled' : ''}>Next →</button>
  `;
}

function changePage(step) {
  currentPage += step;
  renderPosts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('searchInput').addEventListener('input', handleSearch);
initRadar();
</script>
</body>
</html>
