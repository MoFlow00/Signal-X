<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Telegram Radar Ultra</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f1f5f9;
            --card: #ffffff;
            --blue: #0088cc;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: Inter, sans-serif;
            color: var(--text);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 999;
            background: linear-gradient(135deg, #0088cc, #005f92);
            padding: 24px 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,.15);
        }

        .header-inner {
            max-width: 1500px;
            margin: auto;
        }

        h1 {
            margin: 0;
            color: white;
            font-size: 28px;
            text-align: center;
        }

        .search-box {
            margin-top: 18px;
        }

        #searchInput {
            width: 100%;
            padding: 16px 20px;
            border-radius: 999px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .controls {
            max-width: 1500px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .stats {
            font-weight: 700;
            color: var(--muted);
        }

        .radar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1800px;
            margin: auto;
        }

        .post-card {
            background: var(--card);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,.06);
            transition: .25s;
        }

        .post-card:hover {
            transform: translateY(-4px);
        }

        .post-header {
            display: flex;
            justify-content: space-between;

            padding: 14px 16px;
            border-bottom: 1px solid var(--border);

        }

        .keyword {
            color: var(--blue);
            font-weight: 700;
        }

            font-size: 13px;

        }

            min-height: 180px;

        .post-footer {
            padding: 14px;
            text-align: center;

                grid-template-columns: 1fr;
                padding: 12px;
            }

                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-inner">

            <h1>📡 Telegram Radar Ultra</h1>

            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="ابحث بالكلمة المفتاحية أو اسم القناة"
                />
            </div>

        </div>
    </header>

    <div class="controls">
        <div class="stats" id="statsDisplay">
            جاري التحميل...
        </div>
    </div>

    <div id="loading" class="loader">
        جاري تحميل البوستات...
    </div>

    <div id="radarGrid" class="radar-grid"></div>

    <script>

        const CSV_URL =
            'https://raw.githubusercontent.com/Mohamed4088/Telegram_Scrapper2/main/telegram_data.csv';

        let allData = [];
        let filteredData = [];

        const POSTS_PER_CHANNEL = 8;
        const CHANNEL_LIMIT = 60;

        async function initRadar() {

            try {

                const response = await fetch(CSV_URL);

                const csvText = await response.text();

                Papa.parse(csvText, {

                    header: true,
                    skipEmptyLines: true,

                    complete: function(results) {

                        allData = results.data.filter(row =>
                            row.LatestID &&
                            row.LatestID !== "None" &&
                            row.Link
                        );

                        filteredData = [...allData];

                        document.getElementById('loading').style.display = 'none';

                        renderPosts();
                    }
                });

            } catch (err) {

                console.error(err);

                document.getElementById('loading').innerHTML =
                    'فشل تحميل البيانات';
            }
        }

        function renderPosts() {

            const grid = document.getElementById('radarGrid');

            grid.innerHTML = '';

            const displayChannels =
                filteredData.slice(0, CHANNEL_LIMIT);

            let totalPosts = 0;

            displayChannels.forEach(item => {

                try {

                    const username =
                        item.Link.split('t.me/')[1].split('/')[0];

                    const latestId =
                        parseInt(item.LatestID);

                    for (let i = 0; i < POSTS_PER_CHANNEL; i++) {

                        const msgId = latestId - i;

                        if (msgId <= 0) break;

                        totalPosts++;

                        const card = document.createElement('div');

                        card.className = 'post-card';

                        card.innerHTML = `

                            <div class="post-header">

                                <div class="keyword">
                                    # ${item.Keyword || 'UNKNOWN'}
                                </div>

                                <div class="channel">
                                    @${username}
                                </div>

                            </div>

                            <div
                                class="telegram-widget-container"
                                data-username="${username}"
                                data-msgid="${msgId}">
                            </div>

                            <div class="post-footer">

                                <a
                                    href="https://t.me/${username}/${msgId}"
                                    target="_blank">

                                    فتح البوست 🚀

                                </a>

                            </div>
                        `;

                        grid.appendChild(card);
                    }

                } catch(e) {

                    console.log('channel error', e);
                }

            });

            document.getElementById('statsDisplay').innerText =
                `يعرض ${totalPosts} بوست من ${displayChannels.length} قناة`;

            lazyLoadWidgets();
        }

        function lazyLoadWidgets() {

            const widgets =
                document.querySelectorAll('.telegram-widget-container');

            const observer =
                new IntersectionObserver((entries) => {

                    entries.forEach(entry => {

                        if (!entry.isIntersecting) return;

                        const el = entry.target;

                        if (el.dataset.loaded) return;

                        el.dataset.loaded = true;

                        const username =
                            el.dataset.username;

                        const msgid =
                            el.dataset.msgid;

                        const script =
                            document.createElement('script');

                        script.async = true;

                        script.src =
                            'https://telegram.org/js/telegram-widget.js?22';

                        script.setAttribute(
                            'data-telegram-post',
                            `${username}/${msgid}`
                        );

                        script.setAttribute(
                            'data-width',
                            '100%'
                        );

                        script.setAttribute(
                            'data-userpic',
                            'false'
                        );

                        el.appendChild(script);

                        observer.unobserve(el);
                    });

                }, {
                    rootMargin: '400px'
                });

            widgets.forEach(el => observer.observe(el));
        }

        function handleSearch() {

            const term =
                document.getElementById('searchInput')
                .value
                .toLowerCase();

            filteredData = allData.filter(item => {

                return (
                    item.Keyword?.toLowerCase().includes(term) ||
                    item.Link?.toLowerCase().includes(term)
                );
            });

            renderPosts();
        }

        document
            .getElementById('searchInput')
            .addEventListener('input', handleSearch);

        initRadar();

    </script>

</body>
</html>
