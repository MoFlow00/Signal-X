<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MoFlow Radar Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --main: #0088cc; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 350px; background: #fff; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .search-area { padding: 15px; background: var(--main); color: #fff; }
        .search-area input { width: 100%; padding: 10px; border-radius: 5px; border: none; }
        .channel-list { flex: 1; overflow-y: auto; }
        .channel-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .channel-item:hover { background: #f0f7ff; }
        .main-view { flex: 1; display: flex; flex-direction: column; background: #e7ebf0; }
        .timeline { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .post-box { width: 100%; max-width: 500px; margin-bottom: 15px; background: #fff; border-radius: 8px; }
        #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:flex; justify-content:center; align-items:center; z-index:9999; }
    </style>
</head>
<body>

<div id="loading"><h1>جاري تحميل الرادار...</h1></div>

<div class="sidebar">
    <div class="search-area">
        <div style="margin-bottom:8px;">📡 MoFlow Radar</div>
        <input type="text" id="search" placeholder="بحث..." onkeyup="search()">
    </div>
    <div id="list" class="channel-list"></div>
</div>

<div class="main-view">
    <div id="timeline" class="timeline">
        <h2 style="color:#999; margin-top:100px;">اختر قناة لمشاهدة التايم لاين</h2>
    </div>
</div>

<script>
    const CSV_URL = 'https://raw.githubusercontent.com/moflow/radar/main/telegram_data.csv';
    let data = [];

    async function init() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            Papa.parse(text, {
                header: true,
                complete: (r) => {
                    data = r.data.filter(d => d.Link);
                    document.getElementById('loading').style.display = 'none';
                    renderList(data);
                }
            });
        } catch(e) { alert("خطأ في جلب البيانات. تأكد من رابط الـ CSV واسم الـ Repo الجديد."); }
    }

    function renderList(arr) {
        const list = document.getElementById('list');
        list.innerHTML = arr.slice(0, 100).map(item => `
            <div class="channel-item" onclick="show('${item.Link}', '${item.LatestID}')">
                <strong>${item.Channel_Name || 'قناة'}</strong><br>
                <small>${item.Keyword} | @${item.Link.split('/').pop()}</small>
            </div>
        `).join('');
    }

    function show(link, latestId) {
        const username = link.split('/').pop();
        const container = document.getElementById('timeline');
        container.innerHTML = '';
        
        if (!latestId || latestId === "None" || latestId === "undefined") {
            container.innerHTML = '<p>جاري انتظار الـ ID Hunter لتحديث هذه القناة...</p>';
            return;
        }

        for (let i = 0; i < 30; i++) {
            const id = parseInt(latestId) - i;
            if (id <= 0) break;
            const box = document.createElement('div');
            box.className = 'post-box';
            container.appendChild(box);
            const s = document.createElement('script');
            s.async = true; s.src = "https://telegram.org/js/telegram-widget.js?22";
            s.setAttribute("data-telegram-post", `${username}/${id}`);
            s.setAttribute("data-width", "100%");
            box.appendChild(s);
        }
    }

    function search() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = data.filter(d => (d.Keyword + d.Link).toLowerCase().includes(term));
        renderList(filtered);
    }

    init();
</script>
</body>
</html>
