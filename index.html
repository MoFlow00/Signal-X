<script>
const CSV_URL = 'https://raw.githubusercontent.com/Mohamed4088/Telegram_Scrapper2/main/telegram_data.csv';
let allData = [];
let currentPage = 0;
const pageSize = 12;

async function init() {
    try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error('CSV load failed');
        const text = await res.text();

        Papa.parse(text, {
            header: true,
            skipEmptyLines: true,
            complete: (results) => {
                allData = results.data.filter(d => d.Link && d.Link.includes('t.me/') && !d.Link.includes('+'));
                render();
            }
        });
    } catch (e) {
        document.getElementById('wrapper').innerHTML = '<div class="loader-inner">فشل في تحميل ملف القنوات</div>';
    }
}

async function fetchPostHTML(username, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;

    try {
        const targetUrl = 'https://t.me/s/' + username;
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl);
        const res = await fetch(proxyUrl);

        if (!res.ok) throw new Error('proxy failed');

        const htmlText = await res.text();
        if (!htmlText || htmlText.length < 100) throw new Error('empty html');

        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');
        const messages = doc.querySelectorAll('.tgme_widget_message_wrap');

        if (!messages.length) {
            container.innerHTML = '<div class="loader-inner">لا يوجد منشورات عامة</div>';
            return;
        }

        const lastMsg = messages[messages.length - 1].outerHTML
            .replace(/src="///g, 'src="https://')
            .replace(/src="//g, 'src="https://t.me/')
            .replace(/href="///g, 'href="https://')
            .replace(/href="//g, 'href="https://t.me/');

        container.innerHTML = lastMsg;
    } catch (e) {
        container.innerHTML = '<div class="loader-inner">فشل في جلب المحتوى</div>';
        console.error('Telegram fetch error:', username, e);
    }
}

function render() {
    const wrapper = document.getElementById('wrapper');
    wrapper.innerHTML = '';

    const slice = allData.slice(currentPage * pageSize, (currentPage + 1) * pageSize);

    slice.forEach((item, index) => {
        let username = '';
        try {
            username = item.Link.split('t.me/')[1].split('/')[0].split('?')[0];
        } catch {
            return;
        }

        const cardId = `post-${currentPage}-${index}`;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header">
                <span># ${item.Keyword || '-'}</span>
                <span>${item.Subscribers || '-'}</span>
            </div>
            <div class="post-body" id="${cardId}">
                <div class="loader-inner">جاري التحميل...</div>
            </div>
            <div style="padding:10px; border-top:1px solid #eee; text-align:center;">
                <a href="${item.Link}" target="_blank" rel="noopener noreferrer" style="color:var(--tg-blue); text-decoration:none; font-size:12px; font-weight:bold;">فتح القناة 🚀</a>
            </div>
        `;
        wrapper.appendChild(card);
        fetchPostHTML(username, cardId);
    });

    document.getElementById('pageInfo').innerText = `صفحة ${currentPage + 1}`;
    document.getElementById('prev').disabled = currentPage === 0;
    document.getElementById('next').disabled = (currentPage + 1) * pageSize >= allData.length;
}

function changePage(step) {
    currentPage += step;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

init();
</script>
