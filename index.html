<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Timeline 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --tg-blue: #0088cc; }
        body { font-family: sans-serif; background: #e7ebf0; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        .card { background: #fff; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 15px; }
        .card-header { font-weight: bold; color: var(--tg-blue); margin-bottom: 15px; border-bottom: 2px solid #f4f4f4; padding-bottom: 10px; }
        .timeline { max-height: 500px; overflow-y: auto; }
        .pagination { text-align: center; margin: 20px; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: var(--tg-blue); color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div id="wrapper" class="grid"></div>

    <script>
        const RAW_CSV = "https://raw.githubusercontent.com/Mohamed4088/Telegram_Scrapper2/main/telegram_data.csv";

        async function load() {
            const res = await fetch(RAW_CSV);
            const text = await res.text();
            Papa.parse(text, {
                header: true,
                complete: (r) => {
                    const container = document.getElementById('wrapper');
                    // بنعرض عينة عشان المتصفح ميهنجش
                    r.data.slice(0, 12).forEach(item => {
                        if (!item.LatestID || item.LatestID === "" || item.LatestID === "None") return;

                        const username = item.Link.split('t.me/')[1].split('/')[0];
                        const lastId = parseInt(item.LatestID);

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-header"># ${item.Keyword} (@${username})</div>
                            <div class="timeline" id="tl-${username}"></div>
                        `;
                        container.appendChild(card);

                        // جلب آخر 5 بوستات (Timeline)
                        const tl = document.getElementById(`tl-${username}`);
                        for(let i = 0; i < 5; i++) {
                            const currentId = lastId - i;
                            if(currentId <= 0) break;
                            
                            const widget = document.createElement('script');
                            widget.async = true;
                            widget.src = "https://telegram.org/js/telegram-widget.js?22";
                            widget.setAttribute("data-telegram-post", `${username}/${currentId}`);
                            widget.setAttribute("data-width", "100%");
                            tl.appendChild(widget);
                        }
                    });
                }
            });
        }
        load();
    </script>
</body>
</html>
