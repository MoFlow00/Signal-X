<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>رادار تليجرام</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --tg-blue: #0088cc;
            --bg: #e7ebf0;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 12px;
            font-family: Tahoma, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .header {
            text-align: center;
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
        }

        .header h1 {
            margin: 0 0 14px;
            font-size: 28px;
        }

        #search {
            width: min(90%, 850px);
            padding: 12px 16px;
            border-radius: 25px;
            border: 1px solid #d1d5db;
            outline: none;
            font-size: 15px;
        }

        .pagination {
            text-align: center;
            margin: 18px 0;
        }

        button {
            padding: 10px 25px;
            border-radius: 20px;
            border: none;
            background: var(--tg-blue);
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #pageInfo {
            margin: 0 15px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,.08);
        }

        .card-header {
            padding: 10px 12px;
            background: var(--tg-blue);
            color: #fff;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
        }

        .card-header span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .post-body {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
            background: #f8fafc;
        }

        .info-box {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
            line-height: 1.8;
            font-size: 14px;
        }

        .label {
            color: var(--muted);
            font-size: 13px;
        }

        .value {
            color: var(--text);
            font-weight: bold;
            word-break: break-word;
        }

        .notice {
            background: #fff7ed;
            color: #9a3412;
            border: 1px solid #fdba74;
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.9;
        }

        .card-footer {
            padding: 12px;
            border-top: 1px solid var(--line);
            text-align: center;
        }

        .card-footer a {
            color: var(--tg-blue);
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            padding: 40px 20px;
            background: #fff;
            border-radius: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📡 رادار تليجرام</h1>
        <input type="text" id="search" placeholder="ابحث في القنوات أو الكلمات المفتاحية..." />
    </div>

    <div class="pagination">
        <button id="prev" onclick="changePage(-1)">السابق</button>
        <span id="pageInfo"></span>
        <button id="next" onclick="changePage(1)">التالي</button>
    </div>

    <div id="wrapper" class="grid"></div>

    <script>
        const CSV_URL = 'https://raw.githubusercontent.com/Mohamed4088/Telegram_Scrapper2/main/telegram_data.csv';

        let allData = [];
        let filteredData = [];
        let currentPage = 0;
        const pageSize = 12;

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                if (!res.ok) throw new Error('CSV load failed');

                const text = await res.text();

                Papa.parse(text, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        allData = (results.data || []).filter(row => row.Link && row.Link.includes('t.me/'));
                        filteredData = [...allData];
                        render();
                    },
                    error: () => {
                        document.getElementById('wrapper').innerHTML =
                            '<div class="empty">فشل في قراءة ملف CSV</div>';
                    }
                });
            } catch (e) {
                document.getElementById('wrapper').innerHTML =
                    '<div class="empty">فشل في تحميل ملف القنوات</div>';
                console.error(e);
            }
        }

        function render() {
            const wrapper = document.getElementById('wrapper');
            wrapper.innerHTML = '';

            const start = currentPage * pageSize;
            const end = start + pageSize;
            const slice = filteredData.slice(start, end);

            if (!slice.length) {
                wrapper.innerHTML = '<div class="empty">لا توجد نتائج</div>';
                updatePagination();
                return;
            }

            slice.forEach((item) => {
                const keyword = item.Keyword || '-';
                const channelName = item['Channel Name'] || item.Channel || item.Name || '-';
                const link = item.Link || '#';
                const subscribers = item.Subscribers || 'N/A';

                const card = document.createElement('div');
                card.className = 'card';

                card.innerHTML = `
                    <div class="card-header">
                        <span title="${keyword}"># ${keyword}</span>
                        <span title="${subscribers}">👥 ${subscribers}</span>
                    </div>

                    <div class="post-body">
                        <div class="info-box">
                            <div class="label">اسم القناة</div>
                            <div class="value">${channelName}</div>
                        </div>

                        <div class="info-box">
                            <div class="label">الرابط</div>
                            <div class="value">${link}</div>
                        </div>

                        <div class="notice">
                            لا يمكن عرض آخر منشور تلقائيًا من هذا الملف لأن البيانات الحالية لا تحتوي على MessageID.
                        </div>
                    </div>

                    <div class="card-footer">
                        <a href="${link}" target="_blank" rel="noopener noreferrer">فتح القناة 🚀</a>
                    </div>
                `;

                wrapper.appendChild(card);
            });

            updatePagination();
        }

        function updatePagination() {
            const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
            document.getElementById('pageInfo').innerText = `صفحة ${currentPage + 1} من ${totalPages}`;
            document.getElementById('prev').disabled = currentPage === 0;
            document.getElementById('next').disabled = currentPage >= totalPages - 1;
        }

        function changePage(step) {
            const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
            currentPage += step;

            if (currentPage < 0) currentPage = 0;
            if (currentPage > totalPages - 1) currentPage = totalPages - 1;

            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('search').addEventListener('input', function () {
            const q = this.value.trim().toLowerCase();

            filteredData = allData.filter(item => {
                const keyword = String(item.Keyword || '').toLowerCase();
                const channelName = String(item['Channel Name'] || item.Channel || item.Name || '').toLowerCase();
                const link = String(item.Link || '').toLowerCase();
                const subscribers = String(item.Subscribers || '').toLowerCase();

                return keyword.includes(q) ||
                       channelName.includes(q) ||
                       link.includes(q) ||
                       subscribers.includes(q);
            });

            currentPage = 0;
            render();
        });

        init();
    </script>
</body>
</html>
