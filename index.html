<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal-X | Telegram Directory.</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --blue: #58a6ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { position: sticky; top: 0; z-index: 100; background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 1rem; }
        .container { max-width: 1400px; margin: auto; padding: 0 1rem; }
        .search-box { width: 100%; max-width: 600px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #21262d; color: white; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; padding: 2rem 0; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; height: 500px; display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card-header { padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.8rem; }
        .iframe-wrap { flex: 1; background: #fff; position: relative; }
        .iframe-wrap iframe { width: 100%; height: 100%; border: none; }
        .card-footer { padding: 12px; border-top: 1px solid var(--border); text-align: center; }
        .btn { display: inline-block; padding: 8px 16px; background: var(--blue); color: #0d1117; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
        #pagination { display: flex; justify-content: center; gap: 10px; margin-bottom: 3rem; }
        .page-btn { padding: 10px 20px; background: var(--card); border: 1px solid var(--border); color: var(--text); cursor: pointer; border-radius: 6px; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0;">📡 Signal-X</h2>
        <input type="text" id="search" class="search-box" placeholder="Search for channels or keywords...">
    </div>
</header>

<div class="container">
    <div id="grid" class="grid"></div>
    <div id="pagination"></div>
</div>

<script>
    const CSV_URL = 'https://raw.githubusercontent.com/MoFlow00/Signal-X/main/telegram_data.csv';
    let data = [];
    let filtered = [];
    let page = 1;
    const size = 24;

    async function load() {
        const r = await fetch(CSV_URL);
        const text = await r.text();
        Papa.parse(text, {
            header: true,
            complete: (results) => {
                data = results.data.filter(x => x.Link && x['Channel Name']);
                filtered = data;
                render();
            }
        });
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const start = (page - 1) * size;
        const items = filtered.slice(start, start + size);

        items.forEach(item => {
            const user = item.Link.split('/').pop();
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="card-header">
                    <span style="color: #8b949e;">#${item.Keyword || 'Misc'}</span>
                    <strong>@${user}</strong>
                </div>
                <div class="iframe-wrap">
                    <iframe src="https://tgstat.com/channel/@${user}/embed" loading="lazy"></iframe>
                </div>
                <div class="card-footer">
                    <a href="${item.Link}" target="_blank" class="btn">View on Telegram</a>
                </div>
            `;
            grid.appendChild(div);
        });
        updateNav();
    }

    function updateNav() {
        const nav = document.getElementById('pagination');
        const max = Math.ceil(filtered.length / size);
        nav.innerHTML = `
            <button class="page-btn" onclick="go(-1)" ${page===1?'disabled':''}>Previous</button>
            <span style="align-self:center">${page} / ${max}</span>
            <button class="page-btn" onclick="go(1)" ${page===max?'disabled':''}>Next</button>
        `;
    }

    function go(step) { page += step; render(); window.scrollTo(0,0); }

    document.getElementById('search').addEventListener('input', (e) => {
        const t = e.target.value.toLowerCase();
        filtered = data.filter(x => 
            (x.Keyword || '').toLowerCase().includes(t) || 
            (x['Channel Name'] || '').toLowerCase().includes(t)
        );
        page = 1;
        render();
    });

    load();
</script>
</body>
</html>
