<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Signal-X | Radar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* CSS هو نفسه بدون تغيير لضمان استقرار الواجهة */
:root{ --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --surface3:#30363d; --blue:#0ea5e9; --blue-glow:rgba(14,165,233,.12); --text:#e6edf3; --text-muted:#8b949e; --border:rgba(240,246,252,.1); --border-soft:rgba(240,246,252,.06); }
[data-theme="light"]{ --bg:#f6f8fa; --surface:#ffffff; --surface2:#f0f2f5; --surface3:#e1e4e8; --blue:#0969da; --blue-glow:rgba(9,105,218,.08); --text:#1f2328; --text-muted:#57606a; --border:rgba(31,35,40,.12); --border-soft:rgba(31,35,40,.06); }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:.25s; }
header{ position:sticky; top:0; z-index:999; background:rgba(13,17,23,.92); backdrop-filter:blur(18px); border-bottom:1px solid var(--border); }
.header-inner{ max-width:1600px; margin:auto; padding:20px 24px; display:flex; flex-direction:column; gap:18px; }
.header-top{ display:flex; align-items:center; justify-content:space-between; }
.logo{ display:flex; align-items:center; gap:14px; }
.logo-icon{ width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,#0ea5e9,#2563eb); display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 10px 30px rgba(14,165,233,.25); }
.logo-text{ font-size:24px; font-weight:700; }
.theme-toggle{ width:44px; height:44px; border:none; cursor:pointer; border-radius:12px; background:var(--surface2); color:var(--text); font-size:18px; }
.controls{ display:flex; gap:14px; flex-wrap:wrap; }
.search-wrapper{ flex:1; position:relative; }
.search-icon{ position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted); }
#searchInput{ width:100%; padding:15px 18px 15px 46px; background:var(--surface2); border:1px solid var(--border); border-radius:18px; color:var(--text); outline:none; }
.sort-select{ min-width:180px; padding:0 14px; border-radius:18px; border:1px solid var(--border); background:var(--surface2); color:var(--text); outline:none; }
.controls-bar{ max-width:1600px; margin:22px auto 0; padding:0 24px; }
.stats-pill{ display:inline-flex; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:10px 16px; color:var(--text-muted); font-size:13px; }
.radar-grid{ max-width:1600px; margin:auto; padding:24px; display:grid; grid-template-columns:repeat(auto-fill,minmax(420px,1fr)); gap:18px; }
.post-card{ background:var(--surface); border:1px solid var(--border); border-radius:24px; overflow:hidden; transition:.25s; animation:fadeUp .3s ease; }
@keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
.post-header{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:var(--surface2); border-bottom:1px solid var(--border-soft); }
.keyword-tag{ background:var(--blue-glow); color:var(--blue); border:1px solid rgba(14,165,233,.25); font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; }
.channel-tag{ background:rgba(139,148,158,.08); border:1px solid var(--border); color:var(--text-muted); font-size:12px; padding:6px 12px; border-radius:999px; }
.telegram-widget-container{ min-height:180px; padding:14px; }
.widget-skeleton{ height:150px; border-radius:18px; background:linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
@keyframes shimmer{ 0%{ background-position:200% 0; } 100%{ background-position:-200% 0; } }
.post-footer{ padding:14px 16px; border-top:1px solid var(--border-soft); }
.open-btn{ display:inline-flex; align-items:center; gap:8px; text-decoration:none; background:var(--blue-glow); color:var(--blue); border:1px solid rgba(14,165,233,.25); padding:10px 16px; border-radius:14px; font-size:13px; font-weight:700; }
#paginationUI{ display:flex; justify-content:center; align-items:center; gap:12px; padding:30px; }
.pg-btn{ background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:12px 22px; border-radius:14px; cursor:pointer; }
#loading{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:80px 20px; color:var(--text-muted); }
.spinner{ width:42px; height:42px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--blue); animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.empty-state{ text-align:center; padding:80px 20px; color:var(--text-muted); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📡</div>
        <div class="logo-text">Signal-X</div>
      </div>
      <button class="theme-toggle" id="themeToggle">🌓</button>
    </div>
    <div class="controls">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search channels or keywords"/>
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="random">Random</option>
        <option value="newest">Newest First</option>
      </select>
    </div>
  </div>
</header>

<div class="controls-bar">
  <div class="stats-pill" id="statsDisplay">Loading...</div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading data...</span>
</div>

<div class="radar-grid" id="radarGrid"></div>
<div id="paginationUI"></div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/moflow00/Signal-X/main/telegram_data.csv';

// قائمة الكلمات الممنوعة (التي تظهر في الصور التي أرفقتها)
const BLACKLIST = [
  'sex', 'porn', 'اباحي', 'سكس', '18+', 'نودز', 'trading', 'crypto signal', 
  'ربح المال', 'التداول', 'signals'
];

let allData = [];
let filteredData = [];
let currentPage = 1;
let currentSort = 'random';
const POSTS_PER_PAGE = 50; // تقليل العدد لزيادة سرعة التحميل

// فلتر لغة صارم جداً (عربي وإنجليزي فقط)
function isValidLanguage(text) {
    if (!text) return true;
    // يرفض أي نص يحتوي على حروف كيريلية (روسي/أوكراني) أو حروف لاتينية مشكلة (إسباني/فرنسي)
    const cyrillicPattern = /[\u0400-\u04FF]/; 
    const accentedPattern = /[áéíóúñ¿¡]/i; // حروف إسبانية مشهورة
    
    if (cyrillicPattern.test(text) || accentedPattern.test(text)) return false;
    
    // يسمح فقط بالعربي، الإنجليزي، الأرقام، والرموز الأساسية
    const allowedPattern = /^[\u0600-\u06FF\u0750-\u077F\uFB50-\uFDFF\uFE70-\uFEFFa-zA-Z0-9\s.,!@#$%^&*()_+-=\[\]{};':"\\|,.<>\/?]+$/;
    return allowedPattern.test(text);
}

function isSafe(text) {
    if (!text) return true;
    const lowerText = text.toLowerCase();
    return !BLACKLIST.some(word => lowerText.includes(word.toLowerCase()));
}

async function initRadar(){
  try{
    const response = await fetch(CSV_URL);
    const csvText = await response.text();
    Papa.parse(csvText,{
      header:true,
      skipEmptyLines:true,
      complete:(results)=>{
        allData = results.data.filter(row=>{
          const latestId = String(row.LatestID || '').trim();
          const channelName = row['Channel Name'] || '';
          const keyword = row.Keyword || '';

          return(
            row.Link && 
            latestId && latestId !== 'None' && !isNaN(parseInt(latestId)) &&
            isValidLanguage(channelName) && isValidLanguage(keyword) &&
            isSafe(channelName) && isSafe(keyword)
          );
        });
        filteredData = [...allData];
        document.getElementById('loading').style.display = 'none';
        renderPosts();
      }
    });
  }catch(err){
    document.getElementById('loading').innerHTML = `<div class="empty-state"><h2>Error loading data</h2></div>`;
  }
}

  // وظيفة ذكية لاكتشاف البوستات المحذوفة أو غير الموجودة
function checkWidgetHealth(container, cardId) {
    setTimeout(() => {
        const iframe = container.querySelector('iframe');
        if (iframe) {
            // تليجرام يضع ارتفاعاً صغيراً جداً (عادة أقل من 80px) إذا كان البوست محذوفاً أو القناة خاصة
            if (iframe.offsetHeight < 80) {
                console.log(`Auto-hiding broken/private post: ${cardId}`);
                const card = document.getElementById(cardId);
                if (card) card.style.display = 'none';
            }
        }
    }, 4000); // ننتظر 4 ثوانٍ لضمان اكتمال تحميل الـ Widget
}

// تعديل وظيفة lazyLoadWidgets لتشمل الفحص
function lazyLoadWidgets(){
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(!entry.isIntersecting) return;
      const el = entry.target;
      if(el.dataset.loaded) return;
      el.dataset.loaded = true;
      
      const cardId = el.closest('.post-card').id;
      el.innerHTML = '';
      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.setAttribute('data-telegram-post', `${el.dataset.username}/${el.dataset.msgid}`);
      script.setAttribute('data-width','100%');
      script.setAttribute('data-userpic','false');
      
      if(document.documentElement.getAttribute('data-theme')==='dark') {
          script.setAttribute('data-dark','1');
      }
      
      el.appendChild(script);
      
      // تشغيل فحص الصحة بعد التحميل
      checkWidgetHealth(el, cardId);
      
      observer.unobserve(el);
    });
  },{rootMargin:'200px'});
  
  document.querySelectorAll('.telegram-widget-container').forEach(el=>observer.observe(el));
}

function renderPosts(){
  const grid = document.getElementById('radarGrid');
  grid.innerHTML = '';
  let allPosts = [];
  
  filteredData.forEach(item=>{
    try{
      const username = item.Link.split('t.me/')[1].split('/')[0];
      const latestId = parseInt(item.LatestID);
      // سحب آخر 10 بوستات فقط لضمان الجودة
      for(let i=0; i<10; i++){
        const msgId = latestId - i;
        if(msgId <= 0) break;
        allPosts.push({ username, msgId, keyword:item.Keyword || 'General' });
      }
    }catch(e){}
  });

  if(currentSort === 'random') allPosts.sort(()=>Math.random() - 0.5);
  else allPosts.sort((a,b)=>b.msgId - a.msgId);

  const start = (currentPage - 1) * POSTS_PER_PAGE;
  const currentPosts = allPosts.slice(start, start + POSTS_PER_PAGE);

  if(currentPosts.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h2>No relevant results found</h2></div>`;
    return;
  }

  currentPosts.forEach((post,index)=>{
    const card = document.createElement('div');
    card.className = 'post-card';
    card.id = `post-${post.username}-${post.msgId}`;
    card.innerHTML = `
      <div class="post-header">
        <span class="keyword-tag">#${escHtml(post.keyword)}</span>
        <span class="channel-tag">@${escHtml(post.username)}</span>
      </div>
      <div class="telegram-widget-container" data-username="${escHtml(post.username)}" data-msgid="${post.msgId}">
        <div class="widget-skeleton"></div>
      </div>
      <div class="post-footer">
        <a class="open-btn" href="https://t.me/${escHtml(post.username)}/${post.msgId}" target="_blank">View on Telegram ↗</a>
      </div>`;
    grid.appendChild(card);
  });
  
  document.getElementById('statsDisplay').innerHTML = `Verified Posts: <strong>${allPosts.length}</strong>`;
  renderPagination(allPosts.length);
  lazyLoadWidgets();
}

function escHtml(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// وظيفة سحرية لاكتشاف البوستات المحذوفة أو غير الموجودة
function checkWidgetHealth(container, cardId) {
    setTimeout(() => {
        const iframe = container.querySelector('iframe');
        if (iframe) {
            // تليجرام يضع ارتفاعاً صغيراً جداً (أقل من 100px) إذا كان البوست غير موجود
            if (iframe.offsetHeight < 80) {
                console.log(`Hiding broken post: ${cardId}`);
                document.getElementById(cardId).style.display = 'none';
            }
        }
    }, 5000); // ننتظر 5 ثواني لضمان تحميل الـ Widget
}

function lazyLoadWidgets(){
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(!entry.isIntersecting) return;
      const el = entry.target;
      if(el.dataset.loaded) return;
      el.dataset.loaded = true;
      
      const cardId = el.closest('.post-card').id;
      el.innerHTML = '';
      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.setAttribute('data-telegram-post', `${el.dataset.username}/${el.dataset.msgid}`);
      script.setAttribute('data-width','100%');
      script.setAttribute('data-userpic','false');
      if(document.documentElement.getAttribute('data-theme')==='dark') script.setAttribute('data-dark','1');
      
      el.appendChild(script);
      checkWidgetHealth(el, cardId); // فحص صحة البوست بعد التحميل
      observer.unobserve(el);
    });
  },{rootMargin:'200px'});
  document.querySelectorAll('.telegram-widget-container').forEach(el=>observer.observe(el));
}

// ... باقي وظائف البحث والتبديل بين الصفحات (نفس الكود السابق) ...
document.getElementById('searchInput').addEventListener('input',()=>{
  currentPage = 1;
  const term = document.getElementById('searchInput').value.toLowerCase();
  filteredData = allData.filter(item=>
    item.Keyword?.toLowerCase().includes(term) ||
    item.Link?.toLowerCase().includes(term) ||
    (item['Channel Name']||'').toLowerCase().includes(term)
  );
  renderPosts();
});

document.getElementById('sortSelect').addEventListener('change',(e)=>{
  currentSort = e.target.value;
  currentPage = 1;
  renderPosts();
});

function renderPagination(totalPosts){
  const totalPages = Math.ceil(totalPosts / POSTS_PER_PAGE);
  document.getElementById('paginationUI').innerHTML = `
    <button class="pg-btn" onclick="changePage(-1)" ${currentPage <= 1 ? 'disabled' : ''}>Prev</button>
    <span style="color:var(--text-muted)">${currentPage} / ${totalPages}</span>
    <button class="pg-btn" onclick="changePage(1)" ${currentPage >= totalPages ? 'disabled' : ''}>Next</button>`;
}

function changePage(step){
  currentPage += step;
  renderPosts();
  window.scrollTo({top:0, behavior:'smooth'});
}

const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click',()=>{
  const newTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme',newTheme);
});
document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

initRadar();
</script>
</body>
</html>
