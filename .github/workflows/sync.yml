name: Signal-X Global Sync (API Version)

on:
  workflow_dispatch: # للتشغيل اليدوي
  schedule:
    - cron: '0 */3 * * *' # يعمل تلقائياً كل 3 ساعات

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas telethon requests

      - name: Run Master Sync (MTProto API)
        env:
          # تأكد أن هذه الأسماء مطابقة لما وضعته في GitHub Secrets
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_STRING_SESSION: ${{ secrets.TG_STRING_SESSION }}
        run: python master_sync.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add telegram_data.csv
          git commit -m "🚀 Auto-Sync: Updated LatestIDs via Telegram API [$(date)]" || echo "No changes to commit"
          git push origin main
