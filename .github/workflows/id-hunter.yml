name: ID Hunter Radar

on:
  workflow_dispatch: # تشغيل يدوي
  schedule:
    - cron: '0 0 * * *' # يشتغل مرة كل يوم بالليل

jobs:
  update-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Deps
        run: pip install pandas requests beautifulsoup4

      - name: Run Hunter
        run: python id_hunter.py

      - name: Commit Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add telegram_data.csv
          git commit -m "Auto-update: Latest Message IDs" || echo "No changes"
          git push
