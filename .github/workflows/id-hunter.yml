name: Global Sync (Merge & ID Hunter)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *' # يعمل يومياً الساعة 3 فجراً
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: pip install pandas requests beautifulsoup4
      - name: Run Master Sync
        run: python master_sync.py
      - name: Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add telegram_data.csv
          git commit -m "Global Sync: Merged and Updated IDs" || echo "No changes"
          git push
