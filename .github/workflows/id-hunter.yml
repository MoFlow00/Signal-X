name: ID Hunter Radar

on:
  workflow_dispatch: # تشغيل يدوي من تبويب Actions
  schedule:
    - cron: '0 2 * * *' # يشتغل يومياً الساعة 2 صباحاً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas requests beautifulsoup4

      - name: Run ID Hunter
        run: python id_hunter.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add telegram_data.csv
          git commit -m "Update LatestID column" || echo "No changes to commit"
          git push
