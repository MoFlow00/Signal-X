name: Ultimate Telegram Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Changes
        if: always() 
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          git commit -m "Hourly Auto-update: Scraped data [$(date)]" || echo "No changes to commit"
          
          git pull --rebase origin main || git merge --strategy-option theirs
          
          git push origin main
